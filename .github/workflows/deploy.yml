name: Deploy to AWS EC2

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    name: Build, Dockerize & Deploy to EC2
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout Repository
      uses: actions/checkout@v3

    # 2. Set up Node.js and build Vite project
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm install

    - name: Build Vite App
      run: npm run build

    # 3. Build Docker image
    - name: Build Docker Image
      run: docker build -t trading-platform:latest .

    # 4. Save Docker image as tarball
    - name: Save Docker Image to TAR
      run: docker save trading-platform:latest | gzip > trading-platform.tar.gz

    # 5. Copy image to EC2 via SCP
    - name: Copy Image to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "trading-platform.tar.gz"
        target: "/home/ec2-user/"

    # 6. SSH into EC2 and deploy the container
    - name: Deploy on EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Load the Docker image
          docker load < /home/ec2-user/trading-platform.tar.gz

          # Stop and remove any existing container
          docker stop trading-platform || true
          docker rm trading-platform || true

          # Run the new container
          docker run -d \
            --name trading-platform \
            --restart unless-stopped \
            -p 80:80 \
            trading-platform:latest

          # Clean up tarball
          rm -f /home/ec2-user/trading-platform.tar.gz

          echo "✅ Deployment successful! App running at http://${{ secrets.EC2_HOST }}"
